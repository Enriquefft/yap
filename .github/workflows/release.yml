name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Run tests
        run: nix develop --command go test ./...

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          sudo ln -sf /usr/bin/musl-gcc /usr/local/bin/x86_64-linux-musl-gcc
          x86_64-linux-musl-gcc --version

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify amd64 binary is statically linked
        run: |
          ARCHIVE=$(ls dist/yap_*_linux_amd64.tar.gz)
          mkdir -p /tmp/verify
          tar -xzf "$ARCHIVE" -C /tmp/verify
          if ldd /tmp/verify/yap 2>&1 | grep -q "not a dynamic executable"; then
            echo "OK: yap is statically linked"
          else
            echo "FAIL: yap has dynamic dependencies:"
            ldd /tmp/verify/yap
            exit 1
          fi

      - name: Verify binary size under 20MB
        run: |
          SIZE=$(stat --printf="%s" /tmp/verify/yap)
          MAX=$((20 * 1024 * 1024))
          SIZE_MB=$((SIZE / 1048576))
          echo "Binary size: $SIZE bytes (~${SIZE_MB} MB)"
          if [ "$SIZE" -lt "$MAX" ]; then
            echo "OK: binary under 20MB limit"
          else
            echo "FAIL: binary $SIZE bytes exceeds 20MB limit ($MAX bytes)"
            exit 1
          fi

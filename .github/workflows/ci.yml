name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Run tests
        run: nix develop --command go test ./...

      - name: Build static binary (musl)
        run: nix develop .#static --command make build-static

      - name: Verify static binary is statically linked and under 20MB
        run: nix develop .#static --command make verify-static size-check

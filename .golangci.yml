# golangci-lint v2 configuration for yap.
#
# Baseline for 0.1 release: core correctness linters only.
# Additional linters (gocritic, revive, misspell, noctx, etc.) will be
# introduced incrementally as the codebase is cleaned up.
#
# CGO is required (malgo, evdev).
# Run: golangci-lint run ./...

version: "2"

run:
  timeout: 5m
  modules-download-mode: vendor

linters:
  default: standard
  enable:
    - bodyclose

  settings:
    govet:
      enable-all: false
    errcheck:
      check-type-assertions: true
      check-blank: false
      exclude-functions:
        # CLI output to stdout/stderr — write errors are non-actionable.
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Print
        - fmt.Printf
        - fmt.Println
        # Tabwriter flush to stdout.
        - (*text/tabwriter.Writer).Flush
        # IPC encoding to unix socket — best-effort responses.
        - (*encoding/json.Encoder).Encode
    staticcheck:
      checks:
        - all
        - "-ST1000" # missing package comments
        - "-ST1005" # error string punctuation
        - "-QF1001" # De Morgan's law suggestions
        - "-QF1003" # tagged switch suggestions
        - "-QF1008" # embedded field selector suggestions
        - "-QF1011" # type inference suggestions

  exclusions:
    presets:
      - common-false-positives
    rules:
      # Test files: relax errcheck.
      - path: _test\.go
        linters:
          - errcheck

      # Code generator is not production code.
      - path: internal/cmd/gen-nixos/
        linters:
          - errcheck

      # Generated NixOS/HM modules are machine-written.
      - path: nixosModules\.go
        linters:
          - errcheck
          - staticcheck

      - path: homeManagerModules\.go
        linters:
          - errcheck
          - staticcheck

      # Cleanup calls where errors are non-actionable.
      - linters:
          - errcheck
        source: "defer func"

      - linters:
          - errcheck
        source: "os\\.Remove"

      - linters:
          - errcheck
        source: "\\.Close\\(\\)"

      - linters:
          - errcheck
        source: "\\.SetDeadline"

      # CGO preambles.
      - linters:
          - govet
        source: "^//.*#cgo"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
